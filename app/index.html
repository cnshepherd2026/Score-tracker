<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chorley Inferno Score Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inferno Score">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
  :root{ --blue:#001689; --blue-dark:#000d52; --yellow:#EBCD33; --grey:#1c1c1e; --grey-light:#2c2c2e; --green:#8CE99A; --cyan:#7fd6ff; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; padding:0; height:100%; overscroll-behavior:none; touch-action:manipulation;
    -webkit-user-select:none; user-select:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#000; }
  #app{ height:100vh; height:100svh; display:flex; flex-direction:column; }
  #app.detailed-layout .zone.home{ flex:2.2 1 0; }
  #app.detailed-layout .zone.away{ flex:1 1 0; }
  .zone{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; cursor:pointer; }
  .zone.detailed{ justify-content:flex-start; align-items:stretch; cursor:default; }
  .zone:active{ filter:brightness(1.15); }
  .zone.home{ background:linear-gradient(180deg, var(--blue) 0%, var(--blue-dark) 100%); }
  .zone.away{ background:linear-gradient(180deg, var(--grey-light) 0%, var(--grey) 100%);
    padding-bottom:env(safe-area-inset-bottom); padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }
  .home-sticky{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center;
    padding-top:max(6px, env(safe-area-inset-top)); padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }
  .player-scroll{ flex:1 1 auto; overflow-y:auto; width:100%; -webkit-overflow-scrolling:touch;
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); padding-bottom:env(safe-area-inset-bottom); }
  .logo{ max-width:45vmin; max-height:18vmin; margin-bottom:6px; pointer-events:none; }
  .zone.detailed .logo{ max-width:32vmin; max-height:12vmin; }
  input.away-name{ background:transparent; border:none; border-bottom:2px solid rgba(255,255,255,0.4); color:#fff;
    font-size:clamp(14px,4vmin,22px); font-weight:700; letter-spacing:2px; text-align:center; text-transform:uppercase;
    padding:2px 6px; margin-bottom:4px; width:90%; max-width:320px; -webkit-user-select:text; user-select:text; }
  input.away-name:focus{ outline:none; border-bottom-color:var(--yellow); }
  .score{ font-size:clamp(56px,20vmin,140px); font-weight:800; color:var(--yellow); line-height:1; pointer-events:none; font-variant-numeric:tabular-nums; }
  .zone.detailed .score{ font-size:clamp(32px,10vmin,70px); margin-bottom:2px; }
  .away .score{ color:#fff; }
  .hint{ position:absolute; bottom:10px; font-size:12px; color:rgba(255,255,255,0.4); pointer-events:none; letter-spacing:1px; }
  .zone.detailed .hint{ position:static; margin:2px 0 4px; }
  #controls{ flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:14px; background:#000; padding:10px 14px;
    border-top:2px solid var(--yellow); border-bottom:2px solid var(--yellow); }
  button{ font-family:inherit; font-weight:700; font-size:15px; letter-spacing:0.5px; padding:12px 20px; border-radius:10px; border:none; cursor:pointer; }
  #undoBtn{ background:var(--yellow); color:#000; }
  #undoBtn:disabled{ background:#444; color:#888; }
  #resetBtn{ background:transparent; color:#fff; border:2px solid #555; }
  #settingsBtn{ background:transparent; color:#666; border:2px solid #333; font-size:18px; padding:8px 14px; }
  @media (orientation:landscape){
    #app{ flex-direction:row; }
    #controls{ flex-direction:column; border-top:none; border-bottom:none; border-left:2px solid var(--yellow); border-right:2px solid var(--yellow); padding:14px 10px; }
  }

  .player-grid{ display:flex; flex-wrap:wrap; gap:6px; padding:4px 8px; width:100%; justify-content:center; }
  .section-label{ font-size:12px; font-weight:800; letter-spacing:1.2px; margin:6px 0 3px; pointer-events:none; text-align:center; width:100%;
    padding-bottom:3px; border-bottom:1px solid currentColor; opacity:0.95; }
  .section-label.attackers{ color:var(--yellow); }
  .section-label.midcourt{ color:var(--green); }
  .section-label.defenders{ color:var(--cyan); }
  .player-btn{ background:rgba(255,255,255,0.08); border:2px solid var(--yellow); border-radius:8px; padding:6px 10px; color:var(--yellow); font-weight:700; min-width:70px; text-align:center; font-size:14px; -webkit-user-select:none; user-select:none; }
  .player-btn:active{ background:rgba(255,255,255,0.2); }
  .player-btn.defender{ border-color:var(--cyan); color:var(--cyan); }
  .player-btn.midcourt{ border-color:var(--green); color:var(--green); }
  .player-btn .cnt{ display:block; font-size:17px; margin-top:1px; }
  .empty-msg{ color:rgba(255,255,255,0.5); font-size:13px; text-align:center; padding:20px; line-height:1.5; }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;
    padding-top:max(20px, env(safe-area-inset-top)); padding-bottom:max(20px, env(safe-area-inset-bottom)); }
  .modal-backdrop.hidden{ display:none; }
  .modal{ background:#111; border:2px solid var(--yellow); border-radius:14px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto;
    padding:18px; color:#fff; -webkit-user-select:auto; user-select:auto; touch-action:auto; }
  .modal h2{ margin:0 0 12px; color:var(--yellow); font-size:18px; letter-spacing:1px; }
  .modal h3{ margin:14px 0 6px; color:#fff; font-size:14px; }
  .mode-btn{ width:100%; padding:18px; margin-bottom:12px; font-size:16px; border-radius:12px; }
  .mode-btn.primary{ background:var(--yellow); color:#000; }
  .mode-btn.secondary{ background:#222; color:#fff; border:2px solid var(--yellow); }
  .mode-btn small{ display:block; font-weight:400; font-size:12px; opacity:0.75; margin-top:4px; }
  .squad-row{ display:flex; align-items:center; gap:8px; padding:10px 8px; border-radius:8px; margin-bottom:6px; background:rgba(255,255,255,0.05); }
  .squad-row.active{ outline:2px solid var(--yellow); }
  .squad-name-btn{ flex:1; background:none; border:none; color:#fff; font-weight:700; font-size:15px; text-align:left; padding:4px; }
  .icon-btn{ background:none; border:none; color:#aaa; font-size:18px; padding:4px 8px; }
  .modal textarea{ width:100%; min-height:70px; background:#1c1c1e; border:1px solid #444; border-radius:8px; color:#fff; padding:8px; font-size:14px; margin-bottom:10px; -webkit-user-select:text; user-select:text; }
  .modal input[type=text]{ width:100%; background:#1c1c1e; border:1px solid #444; border-radius:8px; color:#fff; padding:8px; font-size:15px; margin-bottom:10px; -webkit-user-select:text; user-select:text; }
  .modal-actions{ display:flex; gap:10px; margin-top:10px; }
  .modal-actions button{ flex:1; padding:10px; }
  .btn-primary{ background:var(--yellow); color:#000; }
  .btn-secondary{ background:#333; color:#fff; }
  .btn-danger{ background:transparent; color:#ff6b6b; border:2px solid #ff6b6b; width:100%; margin-top:16px; }
  .add-squad-btn{ width:100%; background:transparent; border:2px dashed #555; color:#aaa; margin-top:6px; }
  .close-x{ float:right; background:none; border:none; color:#aaa; font-size:20px; }
  .lineup-row{ display:flex; align-items:center; gap:10px; padding:8px 6px; font-size:15px; }
  .lineup-row input{ width:20px; height:20px; }
</style>
</head>
<body>
<div id="app">
  <div class="zone home" id="homeZone">
    <div class="home-sticky">
      <img src="/logo.png" class="logo" alt="Chorley Inferno">
      <div class="score" id="homeScore">0</div>
      <div class="hint" id="homeHint">TAP ANYWHERE TO SCORE</div>
    </div>
    <div id="playerArea" class="player-scroll" style="display:none;"></div>
  </div>

  <div id="controls">
    <button id="undoBtn" disabled>UNDO</button>
    <button id="settingsBtn" title="Squads">&#9881;</button>
    <button id="resetBtn">NEW MATCH</button>
  </div>

  <div class="zone away" id="awayZone">
    <input class="away-name" id="awayName" value="OPPONENT" maxlength="20">
    <div class="score" id="awayScore">0</div>
    <div class="hint">TAP ANYWHERE TO SCORE</div>
  </div>
</div>

<div class="modal-backdrop hidden" id="modeModalBackdrop">
  <div class="modal">
    <h2>New Match</h2>
    <button class="mode-btn secondary" id="basicModeBtn">Basic Score Mode<small>Simple tap-anywhere scoring, like today.</small></button>
    <button class="mode-btn primary" id="trackModeBtn">Player Track Mode<small>Pick a squad and track goals/interceptions.</small></button>
    <div class="modal-actions"><button class="btn-secondary" id="modeCancelBtn" style="width:100%;">Cancel</button></div>
  </div>
</div>

<div class="modal-backdrop hidden" id="squadPickModalBackdrop">
  <div class="modal">
    <h2>Which Squad?</h2>
    <div id="squadPickList"></div>
    <div class="modal-actions"><button class="btn-secondary" id="squadPickCancelBtn" style="width:100%;">Cancel</button></div>
  </div>
</div>

<div class="modal-backdrop hidden" id="squadModalBackdrop">
  <div class="modal">
    <button class="close-x" id="closeModalBtn">&times;</button>
    <h2>Squads</h2>
    <div id="squadListView">
      <div id="squadList"></div>
      <button class="add-squad-btn" id="addSquadBtn">+ Add Squad</button>
      <button class="btn-danger" id="clearAllBtn">Clear All Data</button>
    </div>
    <div id="squadEditView" style="display:none;">
      <h3>Squad Name</h3>
      <input type="text" id="editSquadName" maxlength="30">
      <h3>Attackers (one name per line)</h3>
      <textarea id="editAttackers" placeholder="Chloe&#10;Amy&#10;Jess"></textarea>
      <h3>Mid Court (one name per line, optional)</h3>
      <textarea id="editMidcourt" placeholder="Freya&#10;Poppy"></textarea>
      <h3>Defenders (one name per line, optional)</h3>
      <textarea id="editDefenders" placeholder="Mia&#10;Ella"></textarea>
      <div class="modal-actions">
        <button class="btn-secondary" id="backToListBtn">Back</button>
        <button class="btn-primary" id="saveSquadBtn">Save</button>
      </div>
      <button class="btn-danger" id="deleteSquadBtn">Delete This Squad</button>
    </div>
  </div>
</div>

<div class="modal-backdrop hidden" id="lineupModalBackdrop">
  <div class="modal">
    <h2>Who's Playing?</h2>
    <div id="lineupList"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="lineupCancelBtn">Cancel</button>
      <button class="btn-primary" id="lineupStartBtn">Start Match</button>
    </div>
  </div>
</div>

<script>
  var home = 0, away = 0;
  var actionHistory = [];
  var playerStats = {};
  var currentRoster = null;

  var STORAGE_KEY = 'infernoData';
  var data = loadData();

  var homeScoreEl = document.getElementById('homeScore');
  var awayScoreEl = document.getElementById('awayScore');
  var undoBtn = document.getElementById('undoBtn');
  var awayNameInput = document.getElementById('awayName');
  var appEl = document.getElementById('app');
  var homeZone = document.getElementById('homeZone');
  var homeHint = document.getElementById('homeHint');
  var playerArea = document.getElementById('playerArea');

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        parsed.squads.forEach(function(s){
          if(!s.midcourt){ s.midcourt = []; }
          if(!s.lastSelected){ s.lastSelected = null; }
        });
        return parsed;
      }
    }catch(e){}
    return { squads: [], activeSquadId: null, trackPlayers: false };
  }
  function saveData(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
  }
  function getActiveSquad(){
    var i;
    for(i=0;i<data.squads.length;i++){
      if(data.squads[i].id === data.activeSquadId){ return data.squads[i]; }
    }
    return null;
  }
  function inRoster(name){
    return currentRoster === null || currentRoster.indexOf(name) !== -1;
  }
  function resetPlayerStats(){
    playerStats = {};
    var squad = getActiveSquad();
    if(!squad){ return; }
    var i;
    for(i=0;i<squad.attackers.length;i++){ if(inRoster(squad.attackers[i])){ playerStats[squad.attackers[i]] = { count:0, type:'attacker' }; } }
    for(i=0;i<squad.midcourt.length;i++){ if(inRoster(squad.midcourt[i])){ playerStats[squad.midcourt[i]] = { count:0, type:'midcourt' }; } }
    for(i=0;i<squad.defenders.length;i++){ if(inRoster(squad.defenders[i])){ playerStats[squad.defenders[i]] = { count:0, type:'defender' }; } }
  }

  function render(){
    homeScoreEl.textContent = home;
    awayScoreEl.textContent = away;
    undoBtn.disabled = actionHistory.length === 0;
    renderHomeZone();
  }

  function playerGroupHtml(names, type, label, labelClass){
    var visible = names.filter(inRoster);
    if(visible.length === 0){ return ''; }
    var html = '<div class="section-label ' + labelClass + '">' + label + '</div><div class="player-grid">';
    visible.forEach(function(name){
      var c = playerStats[name] ? playerStats[name].count : 0;
      var cls = type === 'defender' ? ' defender' : (type === 'midcourt' ? ' midcourt' : '');
      html += '<div class="player-btn' + cls + '" data-player="' + escapeHtml(name) + '" data-type="' + type + '">' + escapeHtml(name) + '<span class="cnt">' + c + '</span></div>';
    });
    html += '</div>';
    return html;
  }

  function renderHomeZone(){
    var squad = getActiveSquad();
    var detailed = data.trackPlayers && squad;
    homeZone.classList.toggle('detailed', !!detailed);
    appEl.classList.toggle('detailed-layout', !!detailed);
    if(detailed){
      homeHint.style.display = 'none';
      playerArea.style.display = 'block';
      var total = squad.attackers.length + squad.midcourt.length + squad.defenders.length;
      if(total === 0){
        playerArea.innerHTML = '<div class="empty-msg">No players saved for ' + escapeHtml(squad.name) + ' yet.<br>Tap the settings icon below to add attackers.</div>';
      } else {
        var html = '';
        html += playerGroupHtml(squad.attackers, 'attacker', 'ATTACKERS (GOALS)', 'attackers');
        html += playerGroupHtml(squad.midcourt, 'midcourt', 'MID COURT (INTERCEPTIONS)', 'midcourt');
        html += playerGroupHtml(squad.defenders, 'defender', 'DEFENDERS (INTERCEPTIONS)', 'defenders');
        if(html === ''){ html = '<div class="empty-msg">No one selected for today.<br>Tap NEW MATCH to pick who\'s playing.</div>'; }
        playerArea.innerHTML = html;
      }
    } else {
      homeHint.style.display = '';
      playerArea.style.display = 'none';
      playerArea.innerHTML = '';
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function addPoint(team){
    if(team === 'home'){ home = home + 1; } else { away = away + 1; }
    actionHistory.push({ type: team });
    render();
  }

  function addPlayerEvent(name, type){
    if(!playerStats[name]){ playerStats[name] = { count:0, type:type }; }
    playerStats[name].count = playerStats[name].count + 1;
    if(type === 'attacker'){ home = home + 1; }
    actionHistory.push({ type:'player', name:name, playerType:type });
    render();
  }

  homeZone.addEventListener('click', function(e){
    if(data.trackPlayers){
      var target = e.target.closest ? e.target.closest('.player-btn') : null;
      if(target){
        addPlayerEvent(target.getAttribute('data-player'), target.getAttribute('data-type'));
      }
      return;
    }
    addPoint('home');
  });

  document.getElementById('awayZone').addEventListener('click', function(e){
    if(e.target === awayNameInput){ return; }
    addPoint('away');
  });

  undoBtn.addEventListener('click', function(e){
    e.stopPropagation();
    var last = actionHistory.pop();
    if(!last){ return; }
    if(last.type === 'home'){ home = Math.max(0, home - 1); }
    else if(last.type === 'away'){ away = Math.max(0, away - 1); }
    else if(last.type === 'player'){
      if(playerStats[last.name]){ playerStats[last.name].count = Math.max(0, playerStats[last.name].count - 1); }
      if(last.playerType === 'attacker'){ home = Math.max(0, home - 1); }
    }
    render();
  });

  function startNewMatch(roster){
    currentRoster = roster;
    home = 0; away = 0; actionHistory = [];
    awayNameInput.value = 'OPPONENT';
    resetPlayerStats();
    render();
  }

  /* ---------- New Match: mode -> squad -> lineup flow ---------- */
  var modeModalBackdrop = document.getElementById('modeModalBackdrop');
  var squadPickModalBackdrop = document.getElementById('squadPickModalBackdrop');
  var squadPickList = document.getElementById('squadPickList');

  document.getElementById('resetBtn').addEventListener('click', function(e){
    e.stopPropagation();
    modeModalBackdrop.classList.remove('hidden');
  });

  document.getElementById('modeCancelBtn').addEventListener('click', function(){
    modeModalBackdrop.classList.add('hidden');
  });

  document.getElementById('basicModeBtn').addEventListener('click', function(){
    modeModalBackdrop.classList.add('hidden');
    var hasProgress = home > 0 || away > 0 || actionHistory.length > 0;
    if(hasProgress && !confirm('Start a new match? This will reset the score to 0-0.')){ return; }
    data.trackPlayers = false;
    saveData();
    startNewMatch(null);
  });

  document.getElementById('trackModeBtn').addEventListener('click', function(){
    modeModalBackdrop.classList.add('hidden');
    if(data.squads.length === 0){
      alert('No squads saved yet. Tap the settings icon (⚙) to create one first.');
      return;
    }
    openSquadPickModal();
  });

  function openSquadPickModal(){
    var html = '';
    data.squads.forEach(function(squad){
      var activeClass = squad.id === data.activeSquadId ? ' active' : '';
      html += '<div class="squad-row' + activeClass + '"><button class="squad-name-btn" data-pick="' + squad.id + '">' + escapeHtml(squad.name) + '</button></div>';
    });
    squadPickList.innerHTML = html;
    squadPickList.querySelectorAll('[data-pick]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var squadId = btn.getAttribute('data-pick');
        data.activeSquadId = squadId;
        data.trackPlayers = true;
        saveData();
        squadPickModalBackdrop.classList.add('hidden');
        var squad = getActiveSquad();
        openLineupModal(squad);
      });
    });
    squadPickModalBackdrop.classList.remove('hidden');
  }
  document.getElementById('squadPickCancelBtn').addEventListener('click', function(){
    squadPickModalBackdrop.classList.add('hidden');
  });
  squadPickModalBackdrop.addEventListener('click', function(e){
    if(e.target === squadPickModalBackdrop){ squadPickModalBackdrop.classList.add('hidden'); }
  });
  modeModalBackdrop.addEventListener('click', function(e){
    if(e.target === modeModalBackdrop){ modeModalBackdrop.classList.add('hidden'); }
  });

  awayNameInput.addEventListener('click', function(e){ e.stopPropagation(); });

  /* ---------- Lineup ("who's playing") modal ---------- */
  var lineupModalBackdrop = document.getElementById('lineupModalBackdrop');
  var lineupList = document.getElementById('lineupList');

  function lineupGroupHtml(names, defaultSelected){
    var html = '';
    names.forEach(function(name){
      var checked = defaultSelected === null ? true : defaultSelected.indexOf(name) !== -1;
      html += '<label class="lineup-row"><input type="checkbox" data-name="' + escapeHtml(name) + '"' + (checked ? ' checked' : '') + '>' + escapeHtml(name) + '</label>';
    });
    return html;
  }

  function openLineupModal(squad){
    var html = '';
    if(squad.attackers.length){ html += '<div class="section-label attackers">ATTACKERS</div>' + lineupGroupHtml(squad.attackers, squad.lastSelected); }
    if(squad.midcourt.length){ html += '<div class="section-label midcourt">MID COURT</div>' + lineupGroupHtml(squad.midcourt, squad.lastSelected); }
    if(squad.defenders.length){ html += '<div class="section-label defenders">DEFENDERS</div>' + lineupGroupHtml(squad.defenders, squad.lastSelected); }
    if(html === ''){ html = '<div class="empty-msg">This squad has no players yet. Add some via the settings icon.</div>'; }
    lineupList.innerHTML = html;
    lineupModalBackdrop.classList.remove('hidden');
  }

  document.getElementById('lineupCancelBtn').addEventListener('click', function(){
    lineupModalBackdrop.classList.add('hidden');
  });
  document.getElementById('lineupStartBtn').addEventListener('click', function(){
    var checked = lineupList.querySelectorAll('input[type=checkbox]:checked');
    var roster = Array.from(checked).map(function(cb){ return cb.getAttribute('data-name'); });
    var squad = getActiveSquad();
    if(squad){ squad.lastSelected = roster; saveData(); }
    lineupModalBackdrop.classList.add('hidden');
    startNewMatch(roster);
  });
  lineupModalBackdrop.addEventListener('click', function(e){
    if(e.target === lineupModalBackdrop){ lineupModalBackdrop.classList.add('hidden'); }
  });

  /* ---------- Squad settings modal ---------- */
  var squadModalBackdrop = document.getElementById('squadModalBackdrop');
  var squadListView = document.getElementById('squadListView');
  var squadEditView = document.getElementById('squadEditView');
  var squadList = document.getElementById('squadList');
  var editingSquadId = null;

  function openModal(){
    showListView();
    squadModalBackdrop.classList.remove('hidden');
  }
  function closeModal(){
    squadModalBackdrop.classList.add('hidden');
    render();
  }
  function showListView(){
    editingSquadId = null;
    squadEditView.style.display = 'none';
    squadListView.style.display = 'block';
    renderSquadList();
  }
  function showEditView(squadId){
    editingSquadId = squadId;
    var squad = null;
    var i;
    for(i=0;i<data.squads.length;i++){ if(data.squads[i].id === squadId){ squad = data.squads[i]; } }
    if(!squad){ return; }
    document.getElementById('editSquadName').value = squad.name;
    document.getElementById('editAttackers').value = squad.attackers.join('\n');
    document.getElementById('editMidcourt').value = squad.midcourt.join('\n');
    document.getElementById('editDefenders').value = squad.defenders.join('\n');
    squadListView.style.display = 'none';
    squadEditView.style.display = 'block';
  }

  function renderSquadList(){
    var html = '';
    if(data.squads.length === 0){
      html = '<div class="empty-msg">No squads yet. Add one below.</div>';
    }
    data.squads.forEach(function(squad){
      var activeClass = squad.id === data.activeSquadId ? ' active' : '';
      html += '<div class="squad-row' + activeClass + '">' +
        '<button class="squad-name-btn" data-select="' + squad.id + '">' + escapeHtml(squad.name) + '</button>' +
        '<button class="icon-btn" data-edit="' + squad.id + '">&#9998;</button>' +
        '</div>';
    });
    squadList.innerHTML = html;

    var selectBtns = squadList.querySelectorAll('[data-select]');
    selectBtns.forEach(function(btn){
      btn.addEventListener('click', function(){
        setActiveSquad(btn.getAttribute('data-select'));
      });
    });
    var editBtns = squadList.querySelectorAll('[data-edit]');
    editBtns.forEach(function(btn){
      btn.addEventListener('click', function(){
        showEditView(btn.getAttribute('data-edit'));
      });
    });
  }

  function setActiveSquad(squadId){
    if(data.activeSquadId === squadId){ return; }
    data.activeSquadId = squadId;
    saveData();
    renderSquadList();
  }

  document.getElementById('addSquadBtn').addEventListener('click', function(){
    var name = prompt('Squad name (e.g. Volcanos U12):');
    if(!name){ return; }
    name = name.trim();
    if(!name){ return; }
    var id = 's' + Date.now();
    data.squads.push({ id:id, name:name, attackers:[], midcourt:[], defenders:[], lastSelected:null });
    if(!data.activeSquadId){ data.activeSquadId = id; }
    saveData();
    showEditView(id);
  });

  document.getElementById('backToListBtn').addEventListener('click', function(){
    showListView();
  });

  document.getElementById('saveSquadBtn').addEventListener('click', function(){
    var squad = null, i;
    for(i=0;i<data.squads.length;i++){ if(data.squads[i].id === editingSquadId){ squad = data.squads[i]; } }
    if(!squad){ return; }
    var newName = document.getElementById('editSquadName').value.trim();
    squad.name = newName || squad.name;
    squad.attackers = document.getElementById('editAttackers').value.split('\n').map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
    squad.midcourt = document.getElementById('editMidcourt').value.split('\n').map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
    squad.defenders = document.getElementById('editDefenders').value.split('\n').map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
    saveData();
    showListView();
  });

  document.getElementById('deleteSquadBtn').addEventListener('click', function(){
    if(!confirm('Delete this squad? This cannot be undone.')){ return; }
    data.squads = data.squads.filter(function(s){ return s.id !== editingSquadId; });
    if(data.activeSquadId === editingSquadId){
      data.activeSquadId = data.squads.length > 0 ? data.squads[0].id : null;
    }
    saveData();
    showListView();
  });

  document.getElementById('clearAllBtn').addEventListener('click', function(){
    if(!confirm('Clear ALL saved squads and settings? This cannot be undone.')){ return; }
    data = { squads: [], activeSquadId: null, trackPlayers: false };
    saveData();
    currentRoster = null;
    home = 0; away = 0; actionHistory = [];
    playerStats = {};
    showListView();
    render();
  });

  document.getElementById('settingsBtn').addEventListener('click', function(e){
    e.stopPropagation();
    openModal();
  });
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  squadModalBackdrop.addEventListener('click', function(e){
    if(e.target === squadModalBackdrop){ closeModal(); }
  });

  /* ---------- Rotation glitch smoothing ---------- */
  var rotateOverlay = document.createElement('div');
  rotateOverlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.12s;will-change:opacity;';
  document.body.appendChild(rotateOverlay);
  var rotateTimeout;
  function handleOrientationChange(){
    rotateOverlay.style.pointerEvents = 'auto';
    rotateOverlay.style.opacity = '1';
    clearTimeout(rotateTimeout);
    rotateTimeout = setTimeout(function(){
      rotateOverlay.style.opacity = '0';
      rotateOverlay.style.pointerEvents = 'none';
    }, 420);
  }
  window.addEventListener('orientationchange', handleOrientationChange);
  window.addEventListener('resize', handleOrientationChange);
  if(window.screen && window.screen.orientation){
    window.screen.orientation.addEventListener('change', handleOrientationChange);
  }

  resetPlayerStats();
  render();
</script>
</body>
</html>
