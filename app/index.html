<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chorley Inferno Score Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inferno Score">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
  :root{
    --blue:#001689;
    --blue-dark:#000d52;
    --yellow:#EBCD33;
    --grey:#1c1c1e;
    --grey-light:#2c2c2e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    overscroll-behavior:none;
    touch-action:manipulation;
    -webkit-user-select:none; user-select:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#000;
  }
  #app{
    height:100dvh;
    display:flex;
    flex-direction:column;
  }
  .zone{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    cursor:pointer;
  }
  .zone:active{ filter:brightness(1.15); }
  .zone.home{
    background:linear-gradient(180deg, var(--blue) 0%, var(--blue-dark) 100%);
  }
  .zone.away{
    background:linear-gradient(180deg, var(--grey-light) 0%, var(--grey) 100%);
  }
  .logo{
    max-width:60vw;
    max-height:16vh;
    margin-bottom:6px;
    pointer-events:none;
  }
  .label{
    font-size:clamp(14px,4vw,22px);
    font-weight:700;
    letter-spacing:2px;
    color:var(--yellow);
    margin-bottom:4px;
    pointer-events:none;
  }
  .away .label{ color:#fff; }
  input.away-name{
    background:transparent;
    border:none;
    border-bottom:2px solid rgba(255,255,255,0.4);
    color:#fff;
    font-size:clamp(14px,4vw,22px);
    font-weight:700;
    letter-spacing:2px;
    text-align:center;
    text-transform:uppercase;
    padding:2px 6px;
    margin-bottom:4px;
    width:70vw;
    max-width:320px;
    -webkit-user-select:text; user-select:text;
  }
  input.away-name:focus{ outline:none; border-bottom-color:var(--yellow); }
  .score{
    font-size:clamp(72px,26vw,150px);
    font-weight:800;
    color:var(--yellow);
    line-height:1;
    pointer-events:none;
    font-variant-numeric:tabular-nums;
  }
  .away .score{ color:#fff; }
  .hint{
    position:absolute;
    bottom:10px;
    font-size:12px;
    color:rgba(255,255,255,0.4);
    pointer-events:none;
    letter-spacing:1px;
  }
  #controls{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    background:#000;
    padding:10px 14px;
    border-top:2px solid var(--yellow);
    border-bottom:2px solid var(--yellow);
  }
  button{
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.5px;
    padding:12px 20px;
    border-radius:10px;
    border:none;
    cursor:pointer;
  }
  #undoBtn{
    background:var(--yellow);
    color:#000;
  }
  #undoBtn:disabled{
    background:#444;
    color:#888;
  }
  #resetBtn{
    background:transparent;
    color:#fff;
    border:2px solid #555;
  }
  #vs{
    color:#666;
    font-weight:700;
    font-size:13px;
  }
</style>
</head>
<body>
<div id="app">

  <div class="zone home" id="homeZone">
    <img src="/logo.png" class="logo" alt="Chorley Inferno">
    <div class="score" id="homeScore">0</div>
    <div class="hint">TAP ANYWHERE TO SCORE</div>
  </div>

  <div id="controls">
    <button id="undoBtn" disabled>UNDO</button>
    <div id="vs">VS</div>
    <button id="resetBtn">NEW MATCH</button>
  </div>

  <div class="zone away" id="awayZone">
    <input class="away-name" id="awayName" value="OPPONENT" maxlength="20">
    <div class="score" id="awayScore">0</div>
    <div class="hint">TAP ANYWHERE TO SCORE</div>
  </div>

</div>

<script>
  let home = 0, away = 0;
  const history = [];

  const homeScoreEl = document.getElementById('homeScore');
  const awayScoreEl = document.getElementById('awayScore');
  const undoBtn = document.getElementById('undoBtn');
  const awayNameInput = document.getElementById('awayName');

  function render(){
    homeScoreEl.textContent = home;
    awayScoreEl.textContent = away;
    undoBtn.disabled = history.length === 0;
  }

  function addPoint(team){
    if(team === 'home') home++; else away++;
    history.push(team);
    render();
  }

  document.getElementById('homeZone').addEventListener('click', () => addPoint('home'));
  document.getElementById('awayZone').addEventListener('click', (e) => {
    if(e.target === awayNameInput) return;
    addPoint('away');
  });

  undoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const last = history.pop();
    if(last === 'home') home = Math.max(0, home - 1);
    else if(last === 'away') away = Math.max(0, away - 1);
    render();
  });

  document.getElementById('resetBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    if(confirm('Start a new match? This will reset the score to 0-0.')){
      home = 0; away = 0; history.length = 0;
      awayNameInput.value = 'OPPONENT';
      render();
    }
  });

  awayNameInput.addEventListener('click', (e) => e.stopPropagation());

  render();
</script>
</body>
</html>
